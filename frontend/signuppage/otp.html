<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Verify your phone number to complete your HonnetKE account registration.">
  <meta name="author" content="HonnetKE">
  <title>Verify Your Number — HonnetKE</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">

  <!-- Shared Stylesheets -->
  <link rel="stylesheet" href="../landingpage/css/variables.css">
  <link rel="stylesheet" href="../landingpage/css/reset.css">
  <link rel="stylesheet" href="../landingpage/css/global.css">
  <!-- Page-specific -->
  <link rel="stylesheet" href="css/signup.css">
</head>
<body>

  <!-- ═══════════════════════════════════════════
       OTP VERIFICATION
       ═══════════════════════════════════════════ -->
  <main class="otp-page" id="main-content">

    <div class="otp-card">

      <!-- Logo -->
      <div class="otp-logo">
        <a href="../landingpage/landingpage.html" aria-label="HonnetKE Home">
          <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M20 2L35 10.66V28.34L20 37L5 28.34V10.66L20 2Z" fill="#E8900A" fill-opacity="0.15" stroke="#E8900A" stroke-width="2" stroke-linejoin="round"/>
            <path d="M20 10L28 14.6V23.4L20 28L12 23.4V14.6L20 10Z" fill="#E8900A" stroke="#E8900A" stroke-width="1.5" stroke-linejoin="round"/>
            <circle cx="20" cy="19" r="3" fill="#FFF8EC"/>
          </svg>
        </a>
      </div>

      <h1 class="otp-title">Verify Your Number</h1>
      <p class="otp-subtitle">
        We sent a 6-digit code to <span class="otp-phone" id="otp-phone-display">+254 7XX XXX XXX</span>
      </p>

      <form id="otp-form" novalidate>

        <!-- OTP 6-Digit Input -->
        <div class="otp-inputs" id="otp-inputs">
          <input type="text" class="otp-digit" id="otp-1" maxlength="1" inputmode="numeric" pattern="[0-9]" autocomplete="one-time-code" aria-label="Digit 1" autofocus>
          <input type="text" class="otp-digit" id="otp-2" maxlength="1" inputmode="numeric" pattern="[0-9]" aria-label="Digit 2">
          <input type="text" class="otp-digit" id="otp-3" maxlength="1" inputmode="numeric" pattern="[0-9]" aria-label="Digit 3">
          <input type="text" class="otp-digit" id="otp-4" maxlength="1" inputmode="numeric" pattern="[0-9]" aria-label="Digit 4">
          <input type="text" class="otp-digit" id="otp-5" maxlength="1" inputmode="numeric" pattern="[0-9]" aria-label="Digit 5">
          <input type="text" class="otp-digit" id="otp-6" maxlength="1" inputmode="numeric" pattern="[0-9]" aria-label="Digit 6">
        </div>

        <p class="otp-error" id="otp-error"></p>

        <button type="submit" class="btn btn-primary btn-lg" id="otp-submit">
          Verify & Continue
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        </button>

      </form>

      <p class="otp-resend">
        Didn't receive a code?
        <button type="button" class="resend-link" id="resend-btn" disabled>
          Resend in <span class="resend-timer" id="resend-timer">0:45</span>
        </button>
      </p>

    </div>

  </main>

  <!-- JavaScript -->
  <script src="js/otp.js"></script>

</body>
</html>
